<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
 <link rel="stylesheet" href="style.css">
</head>
<body>


<div id="loginPage" class="login-bg">
  <div class="login-card">
    <div class="text-center mb-8">
      
       <i class="fa-brands fa-github"></i>
     
      <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
    </div>

    <div id="loginErr" class="hidden mb-3 p-3 bg-red-50 border border-red-200 rounded-lg text-red-600 text-sm text-center"></div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
        <input id="inp_user" type="text" class="fi" value="admin"/>
        <p class="text-xs text-purple-500 mt-1">Default: admin</p>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input id="inp_pass" type="password" class="fi" value="admin123"/>
        <p class="text-xs text-purple-500 mt-1">Default: admin123</p>
      </div>
      <button onclick="doLogin()" class="w-full btn-purple justify-center py-3">Sign In</button>
    </div>

    <div class="divider text-xs text-gray-400 my-4">OR</div>
    <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 text-center text-sm text-gray-500">
      Demo Credentials<br>
      <span class="font-bold text-gray-800">Username:</span> admin &nbsp;
      <span class="font-bold text-gray-800">Password:</span> admin123
    </div>
  </div>
</div>


<div id="appPage" class="hidden">
  <nav class="navbar-custom">
    <div class="flex items-center gap-2 text-white font-bold text-base">
      
     <i class="fa-brands fa-github"></i>
     
      GitHub Issues Tracker
    </div>
    <div class="flex items-center gap-3">
      <div class="search-wrap">
       <i class="fa-solid fa-magnifying-glass"></i>
        <input id="searchInput" class="search-input" type="text" placeholder="Search issues..." oninput="onSearch(this.value)"/>
       
      </div>
      <button class="btn-purple" onclick="openNewModal()">
        <span style="font-size:1.1rem;line-height:1">+</span> New Issue
      </button>
      <button class="btn-ghost-sm" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-7">
    <div class="tab-group mb-5">
      <button class="tab-btn active"id="tab-all"  onclick="switchTab('all')">All</button>
      <button class="tab-btn" id="tab-open" onclick="switchTab('open')">Open</button>
      <button class="tab-btn"id="tab-closed"onclick="switchTab('closed')">Closed</button>
    </div>

    <div class="bg-white border border-gray-200 rounded-xl p-4 mb-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
        <i class="fa-solid fa-circle-info info-icon"></i>
        </div>
        <div>
          <h2 id="issueCount" class="text-base font-bold text-gray-800">Loading…</h2>
          <p class="text-xs text-gray-400">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex items-center gap-4 text-xs font-medium text-gray-600">
        <span class="flex items-center gap-1.5"><span class="status-dot dot-open"></span> Open</span>
        <span class="flex items-center gap-1.5"><span class="status-dot dot-closed"></span> Closed</span>
      </div>
    </div>

    <div id="grid" class="issues-grid"></div>
  </main>
</div>
<div id="detailModal" class="modal-bg hidden" onclick="if(event.target===this)closeDetail()">
  <div class="modal-card">
    <h2 id="dm_title" class="text-lg font-bold text-gray-800 mb-2"></h2>
    <div class="flex flex-wrap items-center gap-2 text-xs mb-3">
      <span id="dm_status" class="px-2.5 py-0.5 rounded-full font-bold text-xs"></span>
      <span id="dm_meta" class="text-gray-400"></span>
    </div>
    <div id="dm_labels" class="flex flex-wrap gap-1.5 mb-3"></div>
    <p id="dm_body" class="text-sm text-gray-600 leading-relaxed bg-gray-50 rounded-lg p-3 mb-5"></p>
    <div class="grid grid-cols-2 gap-3 mb-5">
      <div class="bg-gray-50 rounded-lg p-3">
        <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Assignee</p>
        <p id="dm_assignee" class="text-sm font-bold text-gray-800"></p>
      </div>
      <div class="bg-gray-50 rounded-lg p-3">
        <p class="text-xs text-gray-400 font-semibold uppercase tracking-wide mb-1">Priority</p>
        <p id="dm_priority" class="text-sm font-bold"></p>
      </div>
    </div>
    <div class="flex justify-end">
      <button onclick="closeDetail()" class="btn-purple">Close</button>
    </div>
  </div>
</div>
<div id="newModal" class="modal-bg hidden" onclick="if(event.target===this)closeNewModal()">
  <div class="modal-card">
    <h2 class="text-lg font-bold text-gray-800 mb-5">Create New Issue</h2>
    <div class="space-y-3">
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">Title <span class="text-red-400">*</span></label>
        <input id="ni_title" class="fi" type="text" placeholder="Issue title..."/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">Description</label>
        <textarea id="ni_body" class="fi resize-none" rows="3" placeholder="Describe the issue..."></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Priority</label>
          <select id="ni_priority" class="fi">
            <option value="HIGH">High</option>
            <option value="MEDIUM" selected>Medium</option>
            <option value="LOW">Low</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Assignee</label>
          <input id="ni_assignee" class="fi" type="text" placeholder="Username"/>
        </div>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">Labels <span class="text-gray-400">(comma separated)</span></label>
        <input id="ni_labels" class="fi" type="text" placeholder="bug, enhancement, help wanted"/>
      </div>
    </div>
    <div id="ni_err" class="hidden mt-2 text-red-500 text-xs font-semibold"></div>
    <div class="flex gap-3 justify-end mt-5">
      <button onclick="closeNewModal()" style="padding:8px 18px;border:1.5px solid #e5e7eb;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;background:#fff;color:#374151;">Cancel</button>
      <button onclick="submitNew()" class="btn-purple">Create Issue</button>
    </div>
  </div>
</div>

<script src="script.js">
 
</script>
</body>
</html>
